<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authsia</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div id="authsia-menu" class="authsia-menu">
    <div id="authsia-list" class="authsia-list" role="listbox" aria-label="Saved credentials">
      <!-- Credential items will be inserted here -->
    </div>
    <div id="authsia-empty" class="authsia-empty" style="display: none;" role="status">
      <span class="authsia-empty-text">No passwords for this site</span>
    </div>
    <div id="authsia-loading" class="authsia-loading" style="display: none;" role="status" aria-label="Loading credentials">
      <div class="authsia-skeleton-row">
        <div class="authsia-skeleton-avatar"></div>
        <div class="authsia-skeleton-text">
          <div class="authsia-skeleton-line authsia-skeleton-line--name"></div>
          <div class="authsia-skeleton-line authsia-skeleton-line--username"></div>
        </div>
      </div>
      <div class="authsia-skeleton-row">
        <div class="authsia-skeleton-avatar"></div>
        <div class="authsia-skeleton-text">
          <div class="authsia-skeleton-line authsia-skeleton-line--name"></div>
          <div class="authsia-skeleton-line authsia-skeleton-line--username"></div>
        </div>
      </div>
    </div>
    <div id="authsia-error" class="authsia-error" style="display: none;" role="alert">
      <span class="authsia-error-text">Unable to connect to Authsia</span>
      <span class="authsia-error-hint">Check that the app is running and try again</span>
    </div>
    <div class="authsia-footer">
      <button id="authsia-footer-link" class="authsia-footer-link" type="button" aria-label="Manage passwords in Authsia">
        <svg class="authsia-footer-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13.5 7h-1V5.5C12.5 3.02 10.48 1 8 1S3.5 3.02 3.5 5.5V7h-1a.5.5 0 00-.5.5v7a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-7a.5.5 0 00-.5-.5zM5 5.5C5 3.85 6.35 2.5 8 2.5s3 1.35 3 3V7H5V5.5z" fill="currentColor"/>
        </svg>
        Manage passwords...
      </button>
    </div>
  </div>
  <script src="menu.js"></script>
</body>
</html>
