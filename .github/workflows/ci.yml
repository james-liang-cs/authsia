name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            Tools/AuthsiaNativeHost/.build
          key: ${{ runner.os }}-${{ runner.arch }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved', 'Tools/AuthsiaNativeHost/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swiftpm-

      - name: Verify output scanner without optional developer tools
        env:
          PATH: /usr/bin:/bin
        run: scripts/check-no-secret-output.sh --self-test

      - name: Verify release workflow contracts
        run: scripts/test-release-source-workflow.sh

      - name: Test root package
        shell: bash
        run: |
          log="$RUNNER_TEMP/root-tests.log"
          set +e
          swift test >"$log" 2>&1
          status=$?
          set -e
          scripts/check-no-secret-output.sh "$log"
          cat "$log"
          exit "$status"

      - name: Build authsia release product
        shell: bash
        run: |
          log="$RUNNER_TEMP/authsia-release-build.log"
          set +e
          swift build -c release --product authsia >"$log" 2>&1
          status=$?
          set -e
          scripts/check-no-secret-output.sh "$log"
          cat "$log"
          exit "$status"

      - name: Test native host
        shell: bash
        run: |
          log="$RUNNER_TEMP/native-host-tests.log"
          set +e
          swift test --package-path Tools/AuthsiaNativeHost >"$log" 2>&1
          status=$?
          set -e
          scripts/check-no-secret-output.sh "$log"
          cat "$log"
          exit "$status"

      - name: Build native host release product
        shell: bash
        run: |
          log="$RUNNER_TEMP/native-host-release-build.log"
          set +e
          swift build -c release \
            --package-path Tools/AuthsiaNativeHost \
            --product AuthsiaNativeHost >"$log" 2>&1
          status=$?
          set -e
          scripts/check-no-secret-output.sh "$log"
          cat "$log"
          exit "$status"
