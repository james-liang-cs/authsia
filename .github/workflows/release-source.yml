name: Release source

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release-source:
    name: Source, CLI, SBOM, and attestations
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag resolves to this commit
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          test -n "$tag"
          test "$(git rev-list -n 1 "refs/tags/$tag")" = "$(git rev-parse HEAD)"

      - name: Build public release artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          architecture="$(uname -m)"
          mkdir -p dist
          swift build -c release --product authsia
          cp .build/release/authsia "dist/authsia-${tag}-macos-${architecture}"
          chmod +x "dist/authsia-${tag}-macos-${architecture}"
          scripts/generate-sbom.sh dist/authsia.spdx.json
          git archive --format=tar --prefix="authsia-${tag}/" HEAD \
            | gzip -n > "dist/authsia-${tag}-source.tar.gz"
          (
            cd dist
            shasum -a 256 \
              "authsia-${tag}-macos-${architecture}" \
              authsia.spdx.json \
              "authsia-${tag}-source.tar.gz" \
              > SHA256SUMS
          )
          scripts/verify-release.sh --self-test

      - name: Attest public CLI and SBOM provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/authsia-v*-macos-*
            dist/authsia.spdx.json

      - name: Publish source release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --title "Authsia ${tag}" \
              --generate-notes
          fi
